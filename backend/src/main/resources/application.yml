server:
  port: ${PORT:8080}

app:
  jwt:
    issuer: ${JWT_ISSUER:redearth-beadworks}
    secret: ${JWT_SECRET:redearth_super_secret_key_32bytes_minimum!!}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES:120}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

  data:
    mongodb:
      uri: ${MONGODB_URI}

logging:
  level:
    org.springframework.security: info
    com.zaxxer.hikari: debug