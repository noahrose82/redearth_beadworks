server:
  port: 8080

app:
  jwt:
    issuer: redearth-beadworks
    secret: redearth_super_secret_key_32bytes_minimum!!
    expirationMinutes: 120

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3308/redearth?allowPublicKeyRetrieval=true&useSSL=false
    username: redearth_user
    password: redearth_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  sql:
    init:
      mode: always

  data:
    mongodb:
      uri: mongodb://localhost:27017/redearth

logging:
  level:
    org.springframework.security: info