server:
  port: ${PORT:8080}

app:
  jwt:
    issuer: ${JWT_ISSUER:redearth-beadworks}
    secret: ${JWT_SECRET:redearth_super_secret_key_32bytes_minimum!!}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES:120}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

  data:
    mongodb:
      uri: ${MONGODB_URI}

logging:
  level:
    org.springframework.security: info
    com.zaxxer.hikari: debug